name: Contentful Export

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug workflow version
        run: echo "NEW WORKFLOW VERSION RUNNING"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10.24.0

      - name: Verify pnpm
        run: |
          which pnpm
          pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Contentful export
        run: pnpm contentful:export
        env:
          CONTENTFUL_MANAGEMENT_TOKEN: ${{ secrets.CONTENTFUL_MANAGEMENT_TOKEN }}

      # ---- COMMIT TO MAIN ----
      - name: Commit to main
        id: commit_main
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add services-data.json

          if git diff --cached --quiet; then
            echo "No changes"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Update Contentful export"
            git push origin HEAD:main
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ---- SYNC TO DEVELOP ----
      - name: Sync to develop
        if: steps.commit_main.outputs.changed == 'true'
        run: |
          git fetch origin
          git checkout develop
          git pull origin develop

          git checkout main -- services-data.json

          git add services-data.json

          if git diff --cached --quiet; then
            echo "No changes for develop"
          else
            git commit -m "Update Contentful export"
            git push origin HEAD:develop
          fi